name: Deploy Infrastructure (CDK)

on:
  push:
    branches: [main]
    paths:
      - "cdk/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: CDK Deploy (${{ github.event.inputs.env || 'dev' }})
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      ENV_NAME: ${{ github.event.inputs.env || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        working-directory: cdk
        run: npm ci

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::664658497880:role/poe2-github-deploy-dev
          aws-region: us-east-1

      - name: Validate game data and projections
        working-directory: cdk
        run: |
          npm test
          npm run project:game-data
          git diff --exit-code ../web/public/ideal-item-data.json

      - name: CDK Deploy
        working-directory: cdk
        run: npx cdk deploy --all --require-approval never --context env=${{ github.event.inputs.env || 'dev' }}

      - name: Project game data into DynamoDB
        working-directory: cdk
        env:
          DYNAMODB_TABLE: poe2-craft-trader-${{ env.ENV_NAME }}
        run: npm run sync:game-data

      # Push the shared HS256 signing secret into Secrets Manager so the craft
      # authorizer verifies the same value the Next.js app signs with. Kept out
      # of the CloudFormation template; sourced from the GitHub `AUTH_SECRET`.
      - name: Sync auth secret
        if: ${{ env.AUTH_SECRET != '' }}
        run: |
          aws secretsmanager put-secret-value \
            --secret-id "poe2-craft-auth-${ENV_NAME}" \
            --secret-string "${AUTH_SECRET}" \
            --region us-east-1
