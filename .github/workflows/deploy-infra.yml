name: Deploy Infrastructure (CDK)

on:
  push:
    branches: [main]
    paths:
      - "cdk/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: CDK Deploy (${{ github.event.inputs.env || 'dev' }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        working-directory: cdk
        run: npm ci

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::664658497880:role/poe2-github-deploy-dev
          aws-region: us-east-1

      - name: CDK Deploy
        working-directory: cdk
        run: npx cdk deploy --all --require-approval never --context env=${{ github.event.inputs.env || 'dev' }}
