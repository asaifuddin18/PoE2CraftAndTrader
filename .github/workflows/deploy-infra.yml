name: Deploy Infrastructure (CDK)

on:
  push:
    branches: [main]
    paths:
      - "cdk/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  id-token: write  # required for OIDC
  contents: read

jobs:
  deploy:
    name: CDK Deploy (${{ github.event.inputs.env || 'dev' }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: Install CDK dependencies
        working-directory: cdk
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-CDK-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: CDK Diff
        working-directory: cdk
        run: npx cdk diff --all --context env=${{ github.event.inputs.env || 'dev' }}
        continue-on-error: true

      - name: CDK Deploy
        working-directory: cdk
        run: |
          npx cdk deploy --all \
            --require-approval never \
            --context env=${{ github.event.inputs.env || 'dev' }}
